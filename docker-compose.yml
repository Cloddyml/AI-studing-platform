services:
    db:
        image: postgres:17-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - "5432:5432"

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
        ports:
            - "6379:6379"

    backend:
        build:
            context: .
            dockerfile: Dockerfile
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        env_file: .env
        volumes:
            - .:/app
        ports:
            - "8000:8000"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    worker:
        build:
            context: .
            dockerfile: Dockerfile
        command: >
            celery -A app.worker.celery_app worker
            --loglevel=info
            --concurrency=2
            --queues=celery
        env_file: .env
        volumes:
            - .:/app
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        security_opt:
            - no-new-privileges:true

volumes:
    postgres_data:
    redis_data:
